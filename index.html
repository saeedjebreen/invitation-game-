<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A Special Invite for Joud</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --stardew-brown: #7d4a27;
            --stardew-light: #f4d0b0;
            --stardew-gold: #ffcc00;
        }

        body {
            background: #000 url('background.png') no-repeat center center;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        #game-container {
            width: 100vw; max-width: 450px; height: 100vh;
            display: flex; flex-direction: column; position: relative;
        }

        .stage {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none;
        }

        .avatar {
            height: 42vh; width: auto;
            image-rendering: pixelated; transition: all 0.3s ease;
            filter: brightness(40%); margin-bottom: 25px; object-fit: contain;
        }

        #my-avatar { margin-left: -5%; z-index: 5; position: relative; }
        #joud-avatar { margin-right: -5%; transform: scaleX(-1); z-index: 2; position: relative; }

        .menu-overlay {
            display: none; background: rgba(44, 28, 18, 0.98);
            border: 4px solid var(--stardew-gold); padding: 12px;
            border-radius: 10px; margin: 10px 15px; z-index: 110; text-align: center;
        }

        #dialogue-box {
            position: absolute; bottom: 15px; left: 10px; right: 10px;
            background: rgba(125, 74, 39, 0.95); border: 4px solid #fff;
            border-radius: 8px; padding: 12px; min-height: 70px;
            z-index: 100; cursor: pointer;
        }

        .dialogue-text { color: white; font-size: 1.6rem; margin: 0; line-height: 1.1; }

        .quest-item {
            background: var(--stardew-light); border: 2px solid var(--stardew-brown);
            padding: 8px; color: black; font-size: 1.1rem; cursor: pointer; margin: 2px;
        }

        #suggestion-box { width: 90%; height: 50px; margin-top: 10px; }

        button { font-family: 'VT323'; padding: 10px; cursor: pointer; font-size: 1.4rem; width: 100%; }
        .btn-confirm { background: #4caf50; color: white; margin-top: 8px; }
        .btn-gold { background: var(--stardew-gold); color: white; margin-top: 5px; }

        #game-over-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: red; flex-direction: column; align-items: center;
            justify-content: center; z-index: 300;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1 style="font-size: 3rem; color: var(--stardew-gold);">QUEST INVITATION</h1>
    <button onclick="startGame()" style="background:none; color:white; border: 4px solid white; padding: 10px 20px;">[ CLICK TO START ]</button>
</div>

<audio id="bg-music" loop><source src="theme-music.mp3" type="audio/mpeg"></audio>
<audio id="over-music"><source src="game-over.mp3" type="audio/mpeg"></audio>

<div id="game-container">
    <div class="stage">
        <img src="me-normal.png" class="avatar" id="my-avatar">
        <img src="joud-normal.png" class="avatar" id="joud-avatar">
    </div>

    <div id="choice-container" class="menu-overlay">
        <div style="display:flex; justify-content:space-between; color:white; font-size: 1.5rem;"><span>NO 😭</span><span>YES 😊</span></div>
        <input type="range" min="0" max="100" value="50" id="emotion-input" oninput="updateEmotion(this.value)" style="width:100%; margin: 15px 0;">
        <button class="btn-confirm" id="confirm-choice-btn" style="opacity:0.5;" disabled onclick="confirmChoice()">PICK A SIDE</button>
    </div>

    <div id="calendar-container" class="menu-overlay">
        <h3 style="color: white; margin-bottom: 5px;">📅 Select Quest Date</h3>
        <input type="datetime-local" id="date-input" style="width: 90%; font-family: 'VT323'; font-size: 1.2rem;">
        <button class="btn-confirm" onclick="confirmDate(false)">Confirm Date</button>
        <button class="btn-gold" onclick="confirmDate(true)">You Choose! 😉</button>
    </div>

    <div id="quest-menu" class="menu-overlay">
        <h3 style="color: white;">⚔️ SELECT ACTIVITIES</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <div class="quest-item" onclick="toggleSelect(this)">☕ Coffee date</div>
            <div class="quest-item" onclick="toggleSelect(this)">🍸 Bar </div>
            <div class="quest-item" onclick="toggleSelect(this)">🍦 Ice cream</div>
            <div class="quest-item" onclick="toggleSelect(this)">💃 Party </div>
            <div class="quest-item" onclick="toggleSelect(this)">🍽️ Dinner</div>
            <div class="quest-item" onclick="toggleSelect(this)">🎳 Bowling</div>
        </div>
        <textarea id="suggestion-box" placeholder="Suggestions?"></textarea>
        <button class="btn-confirm" onclick="finishQuest()">START QUEST!</button>
    </div>

    <div id="final-card" class="menu-overlay" style="background:var(--stardew-light); border: 5px solid var(--stardew-brown); color: var(--stardew-brown);">
        <h2 style="margin:0;">QUEST REGISTERED!</h2>
        <div id="final-details" style="font-size: 1.3rem; text-align: left; margin: 10px 0;"></div>
        <p style="font-size: 1.5rem; color: #d32f2f;">❤️ See you soon, Joud! ❤️</p>
    </div>

    <div id="dialogue-box" onclick="nextMessage()">
        <p class="dialogue-text" id="text-target"></p>
        <div style="text-align:right; font-size: 0.8rem; color: #f4d0b0;">[Tap]</div>
    </div>
</div>

<div id="game-over-screen">
    <h1>GAME OVER</h1>
    <p>Thanks for playing anyway! ❤️</p>
</div>

<script>
    const myAvatar = document.getElementById('my-avatar');
    const joudAvatar = document.getElementById('joud-avatar');
    const textTarget = document.getElementById('text-target');
    const bgMusic = document.getElementById('bg-music');
    const overMusic = document.getElementById('over-music');

    const script = [
        { speaker: "me", text: "Hey Joud, I know we only talked twice and this is sudden..." },
        { speaker: "me", text: "But I wanted to catch your attention with something special. I hope you like it!" },
        { speaker: "joud", face: "joud-shocked.png", text: "I know you're probably shocked..." },
        { speaker: "me", text: "Yeah, a friend gave me the advice to be straightforward... so here I am." }
    ];

    let idx = 0;
    let isTyping = false;
    let gamePhase = "intro";

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        bgMusic.play();
        nextMessage();
    }

    function typeWriter(text, i = 0, callback) {
        isTyping = true;
        if (i < text.length) {
            textTarget.innerHTML = text.substring(0, i + 1);
            setTimeout(() => typeWriter(text, i + 1, callback), 40);
        } else { isTyping = false; if(callback) callback(); }
    }

    function nextMessage() {
        if (isTyping) return;
        
        if (gamePhase === "intro") {
            if (idx < script.length) {
                const line = script[idx];
                if (line.speaker === "me") {
                    joudAvatar.src = "joud-normal.png";
                    myAvatar.style.filter = "brightness(100%)";
                    joudAvatar.style.filter = "brightness(40%)";
                } else {
                    joudAvatar.src = line.face;
                    joudAvatar.style.filter = "brightness(100%)";
                    myAvatar.style.filter = "brightness(40%)";
                }
                typeWriter(line.text);
                idx++;
            } else {
                gamePhase = "choice";
                typeWriter("Joud... will you go on a date with me?", 0, () => {
                    document.getElementById('choice-container').style.display = 'block';
                });
            }
        }
    }

    function updateEmotion(val) {
        const btn = document.getElementById('confirm-choice-btn');
        btn.disabled = false; btn.style.opacity = "1";
        btn.innerText = "CONFIRM SELECTION";
        if (val > 60) myAvatar.src = "me-happy.png";
        else if (val < 40) myAvatar.src = "me-crying.png";
        else {
            myAvatar.src = "me-normal.png";
            btn.disabled = true; btn.style.opacity = "0.5";
            btn.innerText = "PICK A SIDE";
        }
    }

    function confirmChoice() {
        const val = document.getElementById('emotion-input').value;
        document.getElementById('choice-container').style.display = 'none';
        if (val > 50) {
            joudAvatar.src = "Joud-happy.png"; // FIXED CAPITAL J
            joudAvatar.style.filter = "brightness(100%)";
            myAvatar.style.filter = "brightness(100%)";
            typeWriter("Phew... I was worried there for a moment! 😅", 0, () => {
                setTimeout(() => {
                    typeWriter("Please choose a date... or you can leave it to me.");
                    document.getElementById('calendar-container').style.display = 'block';
                }, 1500);
            });
        } else {
            bgMusic.pause(); overMusic.play();
            document.getElementById('game-over-screen').style.display = 'flex';
        }
    }

    function confirmDate(isAuto) {
        let dateVal = isAuto ? "Your choice! 😉" : document.getElementById('date-input').value;
        window.chosenDate = dateVal;
        document.getElementById('calendar-container').style.display = 'none';
        typeWriter("Perfect, now let's choose some activities!", 0, () => {
            setTimeout(() => { document.getElementById('quest-menu').style.display = 'block'; }, 1000);
        });
    }

    function toggleSelect(el) {
        el.dataset.selected = el.dataset.selected === "true" ? "false" : "true";
        el.style.background = el.dataset.selected === "true" ? "var(--stardew-gold)" : "var(--stardew-light)";
    }

    function finishQuest() {
        const selected = Array.from(document.querySelectorAll('.quest-item'))
            .filter(el => el.dataset.selected === "true")
            .map(el => el.innerText.trim());
        const suggestion = document.getElementById('suggestion-box').value;
        document.getElementById('quest-menu').style.display = 'none';
        
        let summary = `<b>📅 DATE:</b> ${window.chosenDate}<br><b>⚔️ ACTIVITIES:</b> ${selected.length > 0 ? selected.join(", ") : "Surprise me!"}`;
        if(suggestion) summary += `<br><b>✉️ NOTE:</b> ${suggestion}`;
        
        document.getElementById('final-details').innerHTML = summary;
        document.getElementById('final-card').style.display = 'block';
        typeWriter("I've saved the quest details! I'll see you then.");
    }
</script>
</body>
</html>
